# ─────────────────────────────────────────────────────────────────────────────
#  GCS-WAF  —  nginx.conf (OpenResty)
#  FIX: properly sized shared dicts, safe init, error resilience
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
worker_rlimit_nofile 65535;
error_log  /var/log/gcs-waf/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── shared memory dicts (ALL must be declared here, not in server{}) ──────
    lua_shared_dict gcs_ip_scores     64m;   # behavior scores per IP
    lua_shared_dict gcs_rate_limit    32m;   # rate limiting counters
    lua_shared_dict gcs_blocklist     32m;   # dynamic IP blocklist
    lua_shared_dict gcs_whitelist     16m;   # trusted IPs
    lua_shared_dict gcs_bot_challenge 16m;   # bot challenge tokens
    lua_shared_dict gcs_threat_intel  32m;   # loaded threat intel feeds
    lua_shared_dict gcs_virtual_patch 16m;   # virtual patches
    lua_shared_dict gcs_stats         8m;    # attack statistics / counters
    lua_shared_dict gcs_geo_cache     16m;   # GeoIP lookup cache
    lua_shared_dict gcs_ml_features   8m;    # ML feature vectors

    # ── Lua package paths ─────────────────────────────────────────────────────
    lua_package_path  "/etc/nginx/waf/?.lua;/usr/local/openresty/lualib/?.lua;;";
    lua_package_cpath "/usr/local/openresty/lualib/?.so;;";

    # ── startup init (runs once per worker on boot) ───────────────────────────
    init_by_lua_block {
        -- Safe require wrapper so missing modules don't crash nginx
        local function safe_require(mod)
            local ok, m = pcall(require, mod)
            if not ok then
                ngx.log(ngx.WARN, "GCS-WAF: could not load module: " .. mod .. " — " .. tostring(m))
                return nil
            end
            return m
        end

        -- Load core modules
        _G.gcs_waf      = safe_require("waf_core")
        _G.gcs_behavior = safe_require("behavior")
        _G.gcs_geoip    = safe_require("geoip")
        _G.gcs_bot      = safe_require("bot_challenge")
        _G.gcs_intel    = safe_require("threat_intel")
        _G.gcs_vpatch   = safe_require("virtual_patch")
        _G.gcs_ml       = safe_require("ml_anomaly")

        -- Pre-load threat intel feeds
        if _G.gcs_intel then
            _G.gcs_intel.load_feeds()
        end

        ngx.log(ngx.INFO, "GCS-WAF: core initialised successfully")
    }

    # ── per-worker timer init ─────────────────────────────────────────────────
    init_worker_by_lua_block {
        -- Only one worker runs background jobs
        if ngx.worker.id() == 0 then
            -- Auto-update threat feeds every 3600s
            local function update_feeds(premature)
                if premature then return end
                if _G.gcs_intel then
                    local ok, err = pcall(_G.gcs_intel.refresh_feeds)
                    if not ok then ngx.log(ngx.ERR, "feed update error: " .. tostring(err)) end
                end
                ngx.timer.at(3600, update_feeds)
            end
            ngx.timer.at(3600, update_feeds)

            -- Flush behavior scores to Redis every 60s
            local function flush_scores(premature)
                if premature then return end
                if _G.gcs_behavior then
                    pcall(_G.gcs_behavior.flush_to_redis)
                end
                ngx.timer.at(60, flush_scores)
            end
            ngx.timer.at(60, flush_scores)

            -- Prune expired blocks every 300s
            local function prune_blocks(premature)
                if premature then return end
                local bl = ngx.shared.gcs_blocklist
                -- iterate and remove expired entries (OpenResty handles TTL natively)
                ngx.timer.at(300, prune_blocks)
            end
            ngx.timer.at(300, prune_blocks)
        end
    }

    # ── logging ───────────────────────────────────────────────────────────────
    log_format gcs_waf_json escape=json
        '{"ts":"$time_iso8601",'
        '"ip":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"ua":"$http_user_agent",'
        '"ref":"$http_referer",'
        '"bytes":$body_bytes_sent,'
        '"rt":"$request_time",'
        '"waf_action":"$http_x_waf_action",'
        '"waf_score":"$http_x_waf_score",'
        '"waf_rule":"$http_x_waf_rule",'
        '"country":"$http_x_gcs_country"}';

    access_log /var/log/gcs-waf/access.log gcs_waf_json buffer=64k flush=5s;

    # ── performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain application/json;

    # ── include virtual hosts ─────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
