# ─────────────────────────────────────────────────────────────────────────────
#  GCS-WAF Dashboard — nginx config
#  Serves the static dashboard and proxies /waf-api/* → waf-core
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy WAF API calls to core container ────────────────────────────────
    location /waf-api/ {
        proxy_pass         http://gcs-waf-core/waf-api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;

        # CORS for dashboard JS fetch calls
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Static dashboard files ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Serve WAF access log directly for dashboard (readonly) ───────────────
    location /logs/ {
        alias /var/log/gcs-waf/;
        autoindex off;
        # Only allow the dashboard JS to fetch (localhost origin)
        allow 172.28.0.0/16;
        deny  all;
    }

    # ── Gzip for faster dashboard load ───────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}
