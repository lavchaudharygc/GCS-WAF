# ─────────────────────────────────────────────────────────────────────────────
#  GCS-WAF  —  default.conf
#  Fixes: health endpoint, proper phase hooks, bot challenge endpoint
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── internal WAF state vars ───────────────────────────────────────────────
    set $waf_action  "allow";
    set $waf_score   "0";
    set $waf_rule    "-";
    set $gcs_country "-";

    # ── health check (must come BEFORE WAF phases) ────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "GCS-WAF OK\n";
    }

    # ── WAF stats API (used by dashboard) ────────────────────────────────────
    location = /waf-api/stats {
        access_log off;
        content_by_lua_block {
            local stats   = ngx.shared.gcs_stats
            local blocked = stats:get("total_blocked") or 0
            local allowed = stats:get("total_allowed") or 0
            local bot_b   = stats:get("bot_blocked")   or 0
            local sqli    = stats:get("sqli_count")    or 0
            local xss     = stats:get("xss_count")     or 0
            local path    = stats:get("path_count")    or 0
            local cmdi    = stats:get("cmdi_count")    or 0
            local ssrf    = stats:get("ssrf_count")    or 0
            local rfi     = stats:get("rfi_count")     or 0
            local top_ips = stats:get("top_ips")       or "[]"

            ngx.header["Content-Type"] = "application/json"
            ngx.header["Access-Control-Allow-Origin"] = "*"
            ngx.say(string.format([[{
  "total_blocked": %d,
  "total_allowed": %d,
  "bot_blocked":   %d,
  "attack_types": {
    "sqli": %d, "xss": %d, "path_traversal": %d,
    "cmdi": %d, "ssrf": %d, "rfi": %d
  },
  "top_ips": %s
}]], blocked, allowed, bot_b, sqli, xss, path, cmdi, ssrf, rfi, top_ips))
        }
    }

    # ── recent attacks log API ────────────────────────────────────────────────
    location = /waf-api/recent {
        access_log off;
        content_by_lua_block {
            ngx.header["Content-Type"]                = "application/json"
            ngx.header["Access-Control-Allow-Origin"] = "*"
            -- Read last 100 lines from access log
            local f = io.open("/var/log/gcs-waf/access.log", "r")
            if not f then
                ngx.say("[]")
                return
            end
            local lines = {}
            for line in f:lines() do
                table.insert(lines, line)
                if #lines > 500 then table.remove(lines, 1) end
            end
            f:close()
            -- Return last 100 blocked entries
            local result = {}
            for i = #lines, math.max(1, #lines - 99), -1 do
                table.insert(result, lines[i])
            end
            ngx.say("[" .. table.concat(result, ",") .. "]")
        }
    }

    # ── virtual patch API (POST to add rule, GET to list) ────────────────────
    location = /waf-api/vpatch {
        access_log off;
        content_by_lua_block {
            ngx.header["Access-Control-Allow-Origin"] = "*"
            if _G.gcs_vpatch then
                _G.gcs_vpatch.handle_api()
            else
                ngx.status = 503
                ngx.say('{"error":"virtual_patch module not loaded"}')
            end
        }
    }

    # ── bot JS challenge endpoint ─────────────────────────────────────────────
    location = /waf-challenge {
        content_by_lua_block {
            if _G.gcs_bot then
                _G.gcs_bot.serve_challenge()
            else
                ngx.exit(403)
            end
        }
    }

    location = /waf-challenge-verify {
        content_by_lua_block {
            if _G.gcs_bot then
                _G.gcs_bot.verify_challenge()
            else
                ngx.exit(403)
            end
        }
    }

    # ── attack simulation test endpoint (dev only) ───────────────────────────
    location /waf-api/simulate {
        access_log off;
        content_by_lua_block {
            ngx.header["Content-Type"]                = "application/json"
            ngx.header["Access-Control-Allow-Origin"] = "*"
            -- This endpoint intentionally receives attack payloads
            -- and returns what the WAF would do, for dashboard testing
            local uri  = ngx.var.uri
            local args = ngx.req.get_uri_args()
            local test_payload = args["payload"] or ""
            -- Run detection without blocking
            local result = { action="simulate", payload=test_payload, score=0, rules_matched={} }
            if _G.gcs_waf then
                result = _G.gcs_waf.simulate(test_payload)
            end
            ngx.say(require("cjson").encode(result))
        }
    }

    # ── main proxy location — ALL WAF phases run here ─────────────────────────
    location / {
        # Phase 1: GeoIP lookup
        access_by_lua_block {
            -- 1. GeoIP
            if _G.gcs_geoip then
                local country = _G.gcs_geoip.lookup(ngx.var.remote_addr)
                ngx.var.gcs_country = country or "XX"
                ngx.req.set_header("X-GCS-Country", ngx.var.gcs_country)
            end

            -- 2. Threat intel / blocklist check
            if _G.gcs_intel then
                local blocked, reason = _G.gcs_intel.check_ip(ngx.var.remote_addr)
                if blocked then
                    local stats = ngx.shared.gcs_stats
                    stats:incr("total_blocked", 1, 0)
                    ngx.var.waf_action = "block"
                    ngx.var.waf_rule   = "threat_intel:" .. (reason or "unknown")
                    ngx.req.set_header("X-WAF-Action", "block")
                    ngx.req.set_header("X-WAF-Rule",   ngx.var.waf_rule)
                    ngx.exit(403)
                end
            end

            -- 3. Core WAF rules (SQLi, XSS, path traversal, etc.)
            if _G.gcs_waf then
                local score, rule = _G.gcs_waf.inspect()
                ngx.var.waf_score = tostring(score or 0)
                if rule then ngx.var.waf_rule = rule end
                if score and score >= 50 then
                    local stats = ngx.shared.gcs_stats
                    stats:incr("total_blocked", 1, 0)
                    ngx.var.waf_action = "block"
                    ngx.req.set_header("X-WAF-Action", "block")
                    ngx.req.set_header("X-WAF-Score",  ngx.var.waf_score)
                    ngx.req.set_header("X-WAF-Rule",   ngx.var.waf_rule)
                    ngx.exit(403)
                end
            end

            -- 4. Virtual patches
            if _G.gcs_vpatch then
                local blocked, rule = _G.gcs_vpatch.check()
                if blocked then
                    local stats = ngx.shared.gcs_stats
                    stats:incr("total_blocked", 1, 0)
                    ngx.var.waf_action = "block"
                    ngx.var.waf_rule   = "vpatch:" .. (rule or "unknown")
                    ngx.req.set_header("X-WAF-Action", "block")
                    ngx.exit(403)
                end
            end

            -- 5. Bot challenge
            if _G.gcs_bot then
                local needs_challenge = _G.gcs_bot.check()
                if needs_challenge then
                    ngx.redirect("/waf-challenge?return=" .. ngx.escape_uri(ngx.var.request_uri))
                    return
                end
            end

            -- 6. Behavior / rate limiting
            if _G.gcs_behavior then
                local score, rule = _G.gcs_behavior.score_request()
                if score then
                    local cur = (tonumber(ngx.var.waf_score) or 0) + score
                    ngx.var.waf_score = tostring(cur)
                    if cur >= 80 then
                        local stats = ngx.shared.gcs_stats
                        stats:incr("total_blocked", 1, 0)
                        ngx.var.waf_action = "block"
                        ngx.var.waf_rule   = "behavior:" .. (rule or "anomaly")
                        ngx.req.set_header("X-WAF-Action", "block")
                        ngx.req.set_header("X-WAF-Score",  ngx.var.waf_score)
                        ngx.exit(403)
                    end
                end
            end

            -- 7. ML anomaly detection
            if _G.gcs_ml then
                local anomaly, confidence = _G.gcs_ml.score()
                if anomaly and confidence and confidence > 0.85 then
                    local stats = ngx.shared.gcs_stats
                    stats:incr("total_blocked", 1, 0)
                    ngx.var.waf_action = "block"
                    ngx.var.waf_rule   = string.format("ml_anomaly:%.2f", confidence)
                    ngx.req.set_header("X-WAF-Action", "block")
                    ngx.exit(403)
                end
            end

            -- 8. All checks passed
            local stats = ngx.shared.gcs_stats
            stats:incr("total_allowed", 1, 0)
            ngx.var.waf_action = "allow"
            ngx.req.set_header("X-WAF-Action", "allow")
            ngx.req.set_header("X-WAF-Score",  ngx.var.waf_score)
        }

        # response headers
        header_filter_by_lua_block {
            ngx.header["X-WAF-Action"]  = ngx.var.waf_action
            ngx.header["X-WAF-Score"]   = ngx.var.waf_score
            ngx.header["X-GCS-Country"] = ngx.var.gcs_country
            -- Remove fingerprinting headers
            ngx.header["Server"]        = "GCS-WAF"
            ngx.header["X-Powered-By"]  = nil
        }

        # log anomalies for ML training
        log_by_lua_block {
            if _G.gcs_ml and ngx.var.waf_action == "allow" then
                pcall(_G.gcs_ml.record_request)
            end
            if _G.gcs_behavior then
                pcall(_G.gcs_behavior.log_request)
            end
        }

        # ── actual proxy to backend ───────────────────────────────────────────
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # ── 403 block page ────────────────────────────────────────────────────────
    error_page 403 /blocked.html;
    location = /blocked.html {
        internal;
        add_header Content-Type "text/html; charset=utf-8";
        add_header X-WAF-Action "block" always;
        return 403 '<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Blocked by GCS-WAF</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:monospace;background:#0d0d0d;color:#ff4444;
       display:flex;align-items:center;justify-content:center;min-height:100vh}
  .box{border:1px solid #ff4444;padding:40px 60px;text-align:center;
       box-shadow:0 0 40px rgba(255,68,68,.3)}
  h1{font-size:48px;letter-spacing:8px;margin-bottom:8px}
  p{color:#888;margin-top:12px;font-size:13px}
  code{color:#ff4444;font-size:11px}
</style></head>
<body><div class="box">
  <h1>BLOCKED</h1>
  <p>GCS-WAF detected a threat in your request.</p>
  <p style="margin-top:20px">Rule: <code>$waf_rule</code> &nbsp;|&nbsp; Score: <code>$waf_score</code></p>
  <p>If this is a mistake, contact the site administrator.</p>
</div></body></html>';
    }
}

# ── upstream backend (change to your real backend) ───────────────────────────
upstream backend {
    server 127.0.0.1:8888 fail_timeout=5s max_fails=3;
    keepalive 32;
}
