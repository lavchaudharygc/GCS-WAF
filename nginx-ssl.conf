# ─────────────────────────────────────────────────────────────────────────────
#  GCS-WAF — HTTPS / SSL Configuration
#  Drop this into waf-core/conf.d/ after running certbot to get certs.
#
#  Usage:
#    1. Set WAF_DOMAIN in .env
#    2. docker-compose --profile ssl up gcs-waf-certbot   # get cert
#    3. Copy this file to waf-core/ssl.conf
#    4. docker-compose restart gcs-waf-core
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name ${WAF_DOMAIN} www.${WAF_DOMAIN};

    # Let's Encrypt challenge (must come before redirect)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        access_log off;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    server_name ${WAF_DOMAIN} www.${WAF_DOMAIN};

    # ── TLS certificates (Let's Encrypt) ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/${WAF_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${WAF_DOMAIN}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${WAF_DOMAIN}/chain.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling (faster TLS handshakes)
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;

    # ── Include WAF state vars (copy from default.conf) ──────────────────────
    set $waf_action  "allow";
    set $waf_score   "0";
    set $waf_rule    "-";
    set $gcs_country "-";

    # ── Health + API endpoints ────────────────────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "GCS-WAF OK\n";
    }

    location /waf-api/ {
        include /etc/nginx/conf.d/waf-api.conf;
    }

    location /waf-challenge {
        content_by_lua_block { if _G.gcs_bot then _G.gcs_bot.serve_challenge() else ngx.exit(403) end }
    }

    # ── Main proxy with all WAF phases ────────────────────────────────────────
    location / {
        # All WAF phases are identical to default.conf
        # Include the shared WAF phase config
        access_by_lua_file  /etc/nginx/waf/phases/access.lua;
        header_filter_by_lua_file /etc/nginx/waf/phases/header_filter.lua;
        log_by_lua_file     /etc/nginx/waf/phases/log.lua;

        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    error_page 403 /blocked.html;
    location = /blocked.html {
        internal;
        return 403 '<html><body style="background:#0d0d0d;color:#ff4444;font-family:monospace;display:flex;align-items:center;justify-content:center;min-height:100vh"><h1>BLOCKED by GCS-WAF</h1></body></html>';
    }
}
